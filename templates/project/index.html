{% extends 'project/base.html' %}
{% block content %}
    <form method="post">
        {% csrf_token %}

        <input type="text" name="user_name" placeholder="Введите имя" autocomplete="off">

        <button type="submit">Отправить</button>
    </form>

    {% if error %}
        <div class="error">
            <p id="error" class="box-error">{{ error }}</p>
        </div>

    {% endif %}
{% endblock %}
